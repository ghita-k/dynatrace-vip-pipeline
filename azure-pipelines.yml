# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
  # Étape 1 : Checkout du repo
  - checkout: self

  # Étape 2 : Afficher la structure complète du répertoire cloné
  - script: |
      echo "Répertoire de travail: $(System.DefaultWorkingDirectory)"
      echo "=== Listing complet récursif ==="
      ls -laR "$(System.DefaultWorkingDirectory)"
    displayName: "Lister tous les fichiers du repo"

  # Étape 3 : Installer Terraform
  - script: |
      wget https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      unzip terraform_1.7.5_linux_amd64.zip
      sudo mv terraform /usr/local/bin/
      terraform -version
    displayName: "Installer Terraform"

  # Étape 4 : Exécuter Terraform init & plan
  - script: |
      terraform init
      terraform plan -out=tfplan
    displayName: "Terraform Init & Plan"
    workingDirectory: "$(System.DefaultWorkingDirectory)"
